{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm p-4 mt-4">
            <h2 class="mb-4 text-center fw-bold text-success">
                <i class="bi bi-person-plus-fill"></i> Daftar Akun
            </h2>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="fw-bold">Nama Lengkap</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Konfirmasi Password</label>
                    <input type="password" name="confirm" class="form-control" required>
                </div>
                <button class="btn btn-success w-100 fw-bold">Daftar Sekarang</button>
            </form>

            <p class="text-center mt-3">
                Sudah punya akun? <a href="/login" class="text-success fw-bold">Login di sini</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
