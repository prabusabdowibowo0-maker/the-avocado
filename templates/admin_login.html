{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-sm p-4">

            <h2 class="mb-4 text-center">
                Login Admin 🔐
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label>Username</label>

                    <input type="text"
                           name="username"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Password</label>

                    <input type="password"
                           name="password"
                           class="form-control">

                </div>

                <button class="btn btn-success w-100">

                    Login

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
