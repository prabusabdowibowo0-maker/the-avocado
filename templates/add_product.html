{% extends 'base.html' %}

{% block content %}
<div class="container-fluid"><div class="admin-layout">

    <div class="admin-sidebar">
        <h3 class="fw-bold text-success mb-4">Admin Panel</h3>
        <a href="/admin"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/products"><i class="bi bi-box-seam"></i> Produk</a>
        <a href="/admin/modal"><i class="bi bi-cash-coin"></i> Modal Awal</a>
        <a href="/journal"><i class="bi bi-journal-text"></i> Jurnal Umum</a>
        <a href="/ledger"><i class="bi bi-book"></i> Buku Besar</a>
        <a href="/trial-balance"><i class="bi bi-bar-chart"></i> Neraca Saldo</a>
        <a href="/income-statement"><i class="bi bi-cash-stack"></i> Laba Rugi</a>
        <a href="/closing-entry"><i class="bi bi-x-circle"></i> Jurnal Penutup</a>
        <a href="/admin/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>

    <div class="admin-content">
        <h1 class="mb-4">Tambah Produk ➕</h1>

        <div class="card shadow-sm p-4" style="max-width:600px;">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="fw-bold">Nama Produk</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Harga Jual</label>
                    <input type="number" name="price" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Harga Modal / HPP</label>
                    <input type="number" name="cost" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Stok</label>
                    <input type="number" name="stock" class="form-control" value="0" required>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Upload Gambar</label>
                    <input type="file" name="image" class="form-control">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Simpan Produk</button>
                    <a href="/admin/products" class="btn btn-outline-secondary">Batal</a>
                </div>
            </form>
        </div>
    </div>

</div></div>
{% endblock %}
