{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="checkout-wrapper">
        <div class="row g-4">

            <div class="col-lg-7">
                <div class="card payment-card">
                    <div class="card-body">
                        <h3 class="fw-bold mb-4">Pembayaran</h3>
                        <form method="POST" id="paymentForm">

                            <div class="mb-4">
                                <label class="fw-bold mb-2">Pilih Metode Pembayaran</label>
                                <select class="form-select payment-select" name="payment_method" required>
                                    <option value="">-- Pilih Metode --</option>
                                    <option value="Cash">Cash</option>
                                    <option value="QRIS">QRIS</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-success w-100 payment-btn">
                                Bayar Sekarang
                            </button>

                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card summary-card">
                    <div class="card-body">
                        <h4 class="fw-bold mb-4">Ringkasan Pesanan</h4>
                        {% for item in cart_items %}
                        <div class="d-flex justify-content-between mb-2">
                            <span>{{ item.name }} x{{ item.quantity }}</span>
                            <strong>{{ (item.price * item.quantity) | format_currency }}</strong>
                        </div>
                        {% endfor %}
                        <hr>
                        <div class="d-flex justify-content-between">
                            <h5>Total</h5>
                            <h5 class="text-success fw-bold">{{ total | format_currency }}</h5>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- PAYMENT MODAL (CASH / QRIS) -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content success-modal">
            <div class="modal-body text-center p-5">
                <div id="paymentContent"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
